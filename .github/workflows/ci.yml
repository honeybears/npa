name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Database E2E tests
        run: pnpm test:e2e

      - name: Benchmark smoke test
        run: pnpm bench --iterations=1000 --warmup=100

      - name: Pack runtime packages
        run: pnpm release:pack

      - name: Inspect packed runtime packages
        run: pnpm release:inspect

      - name: VS Code Extension Host tests
        run: xvfb-run -a pnpm test:vscode
