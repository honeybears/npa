name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm-release:
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest

    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check package versions match stable tag
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const version = process.env.GITHUB_REF_NAME.replace(/^v/, "");

          if (version.includes("-")) {
            throw new Error(`Prerelease tag ${version} is not handled by the stable release workflow.`);
          }

          const files = [
            "package.json",
            "packages/language/package.json",
            "packages/pg/package.json",
            "packages/mysql/package.json",
          ];

          for (const file of files) {
            const pkg = JSON.parse(fs.readFileSync(file, "utf8"));
            if (pkg.version !== version) {
              throw new Error(`${file} is ${pkg.version}, expected ${version}`);
            }
          }
          NODE

      - name: Run unit tests
        run: npm test

      - name: Run database E2E tests
        run: npm run test:e2e

      - name: Pack npm packages
        run: CI=true pnpm run release:pack

      - name: Inspect packed packages
        run: CI=true pnpm run release:inspect

      - name: Publish npm packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          npm publish ".release/node-persistence-api-core-${VERSION}.tgz" --access public --tag latest
          npm publish ".release/node-persistence-api-language-${VERSION}.tgz" --access public --tag latest
          npm publish ".release/node-persistence-api-connector-pg-${VERSION}.tgz" --access public --tag latest
          npm publish ".release/node-persistence-api-connector-mysql-${VERSION}.tgz" --access public --tag latest

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
